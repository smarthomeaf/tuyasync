# Base images the Supervisor substitutes into the Dockerfile's ${BUILD_FROM}.
# HA Alpine base: includes bashio + s6-overlay, which run.sh depends on.
build_from:
  aarch64: ghcr.io/home-assistant/aarch64-base:3.21
  amd64: ghcr.io/home-assistant/amd64-base:3.21
  armv7: ghcr.io/home-assistant/armv7-base:3.21
