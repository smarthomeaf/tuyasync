name: TuyaSync
version: "1.1.1"
slug: tuyasync
description: Scan, sync and repair Tuya Local devices with a live diff of scanned vs. configured IPs.
url: "https://github.com/smarthomeaf/tuyasync"
arch:
  - aarch64
  - amd64
  - armv7
# host_network is REQUIRED: the tinytuya broadcast scan uses UDP 6666/6667/7000
# which cannot cross Docker's bridge network onto your IOT VLAN otherwise.
host_network: true
# Ingress makes the UI appear in the HA sidebar behind HA auth.
ingress: true
ingress_port: 8099
panel_icon: mdi:sync-circle
panel_title: TuyaSync
init: false
# Grant a Supervisor token with hassio API access so we can call the
# WebSocket/Core API to read and update Tuya Local config entries.
hassio_api: true
homeassistant_api: true
auth_api: true
map:
  - share:rw
  # read-only view of HA config: entry host/local_key live in
  # .storage/core.config_entries, which the API never exposes
  - homeassistant_config:ro
options:
  api_key: ""
  api_secret: ""
  api_region: "us"
  api_device_id: ""
  scan_retries: 6
schema:
  api_key: str?
  api_secret: password?
  api_region: list(us|eu|cn|in|eu-w|us-e)?
  api_device_id: str?
  scan_retries: int(1,50)?
